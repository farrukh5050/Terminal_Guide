# ============================================================
# Cloudflare Workers config for the StreetCars backend.
# Wrangler reads this file to know what to deploy and how.
# ============================================================

# The Worker's name in the Cloudflare dashboard.
# Also used as the subdomain on workers.dev (see below).
name = "streetcars-api"

# Entry point — the file Wrangler bundles and uploads.
main = "worker.js"

# Pins the Worker runtime to a specific date's behaviour so future
# Cloudflare runtime updates can't break your code. Bump this when
# you want to opt into newer features.
compatibility_date = "2026-05-08"

# Gives you a free URL at:
#   https://streetcars-api.<your-cloudflare-subdomain>.workers.dev
# Useful for testing before wiring up your own domain.
workers_dev = true

# Routes (uncomment and edit once you have a custom domain set up):
# routes = [
#   { pattern = "pickup.yourdomain.com/api/*", zone_name = "yourdomain.com" }
# ]
